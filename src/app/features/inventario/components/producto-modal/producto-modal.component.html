<div class="producto-modal">

<div class="modal-header">

<h2 class="modal-title">Nuevo Producto</h2>

<button type="button" class="close" (click)="onClose()"></button>

</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="modal-form">

<div class="form-field">

<label>SKU</label>

<input formControlName="sku" type="text" />

</div>

<div class="form-field">

<label>Nombre del Producto</label>

<input formControlName="nombre" type="text" />

</div>

<div class="form-field full-width">

<label>Categoría</label>

<input formControlName="categoria" type="text" list="categoriaOpciones" placeholder="Escribe o selecciona" />

</div>

<div class="grid-row">

<div class="form-field">

<label>Stock Máximo</label>

<input formControlName="stockMaximo" type="number" />

</div>

<div class="form-field">

<label>Stock</label>

<input formControlName="stock" type="number" />

</div>

</div>

<div class="grid-row">

<div class="form-field">

<label>Precio Unitario</label>

<input formControlName="precioUnitario" type="number" step="0.01" />

</div>

<div class="form-field">

<small class="fixed-note">Stock mínimo: 10 (fijo)</small>

</div>

</div>

<div class="form-field full-width">

<label>Descripción</label>

<textarea formControlName="descripcion"></textarea>

</div>

</form>

<div class="modal-actions">

<button type="button" (click)="onCancel()" class="btn-cancel">Cancelar</button>

<button type="submit" class="btn-save">Guardar Producto</button>

</div>

<datalist id="categoriaOpciones">

<option *ngFor="let c of sugerencias" [value]="c"></option>

</datalist>

</div>
