<div class="modal-card">
  <header class="modal-header">
    <h3>Nuevo Producto</h3>
    <button type="button" class="close-btn" (click)="onCancel()">&times;</button>
  </header>
  <section class="modal-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="pm-row pm-2cols">
        <div class="pm-field">
          <label>SKU</label>
          <input type="text" formControlName="sku" placeholder="SKU-001" />
        </div>
        <div class="pm-field">
          <label>Nombre del Producto</label>
          <input type="text" formControlName="nombre" placeholder="Nombre del producto" />
        </div>
      </div>
      <div class="pm-field">
        <label>Categoría</label>
        <input type="text" formControlName="categoria" list="categoriaOpciones" placeholder="Escribe o selecciona" />
      </div>
      <div class="pm-row pm-2cols">
        <div class="pm-field">
          <label>Stock Mínimo</label>
          <input type="number" formControlName="minimo" [value]="10" [readonly]="true" class="pm-readonly" />
          <small class="pm-hint">Fijo en 10</small>
        </div>
        <div class="pm-field">
          <label>Stock Máximo</label>
          <input type="number" formControlName="stockMaximo" />
        </div>
      </div>
      <div class="pm-row pm-2cols">
        <div class="pm-field">
          <label>Stock</label>
          <input type="number" formControlName="stock" />
        </div>
        <div class="pm-field">
          <label>Precio Unitario</label>
          <input type="number" step="0.01" formControlName="precioUnitario" />
        </div>
      </div>
      <div class="pm-field">
        <label>Descripción</label>
        <textarea rows="3" formControlName="descripcion"></textarea>
      </div>
    </form>
  </section>
  <footer class="modal-footer">
    <button type="button" class="btn-secondary" (click)="onCancel()">Cancelar</button>
    <button type="button" class="btn-primary" [disabled]="guardando" (click)="onSubmit()">{{ guardando ? 'Guardando...' : 'Guardar Producto' }}</button>
  </footer>
</div>
<datalist id="categoriaOpciones">
  <option *ngFor="let c of sugerencias" [value]="c"></option>
</datalist>
